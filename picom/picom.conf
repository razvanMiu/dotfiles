# Razvan's dwm picom config: restrained compositor for shadows, fades,
# rounded corners, and rofi transparency without heavy blur/animations.

backend = "glx";
vsync = true;

# Shadows: subtle depth, not a full "rice" glow.
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.25;
shadow-color = "#000000";
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'slop'",
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "window_type = 'dnd'",
  "window_type = 'tooltip'",
  "_GTK_FRAME_EXTENTS@"
];

# No animations/fades. Keep dwm tag switches immediate.
fading = false;

# Rounded corners. Rofi also has its own border radius; picom makes the
# transparent corners render correctly instead of black.
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "override_redirect = true"
];

# Keep normal windows opaque. Dropdown st windows stay internally opaque
# (`st -A 1.0`) and picom owns their translucency/blur here.
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "88:class_g = 'dropdown-terminal'",
  "88:class_i = 'dropdown-terminal'",
  "88:class_g = 'dropdown-notes'",
  "88:class_i = 'dropdown-notes'",
  "88:class_g = 'dropdown-widgets'",
  "88:class_i = 'dropdown-widgets'"
];

# Avoid tearing/flicker and make behavior sane with modern clients.
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;

# Do not unredirect fullscreen by default; avoids compositor flicker surprises.
unredir-if-possible = false;

# Blur only behind translucent dropdowns. Keep the rest of dwm crisp.
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-method = "gaussian";
blur-size = 12;
blur-deviation = 5.0;
blur-background-exclude = [
  "!(class_g = 'dropdown-terminal' || class_i = 'dropdown-terminal' || class_g = 'dropdown-notes' || class_i = 'dropdown-notes' || class_g = 'dropdown-widgets' || class_i = 'dropdown-widgets')"
];

wintypes:
{
  tooltip = { fade = false; shadow = false; opacity = 0.95; focus = true; full-shadow = false; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
};
