# Razvan's tmux configuration
# XDG: tracked config lives in ~/.config/tmux; plugin/vendor code lives in ~/.local/share/tmux.

source-file "$XDG_CONFIG_HOME/tmux/conf.d/00-core.conf"
source-file "$XDG_CONFIG_HOME/tmux/conf.d/10-keys.conf"
source-file "$XDG_CONFIG_HOME/tmux/conf.d/20-theme.conf"
source-file "$XDG_CONFIG_HOME/tmux/conf.d/30-plugins.conf"
source-file "$XDG_CONFIG_HOME/tmux/conf.d/40-status.conf"
source-file "$XDG_CONFIG_HOME/tmux/conf.d/90-help.conf"
