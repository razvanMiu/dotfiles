##### Prefix and keybindings ##################################################

# Use tmux's default C-b prefix. With Caps Lock mapped to Ctrl this is easy to
# reach, avoids stealing shell/readline C-a, and keeps defaults/docs familiar.
set -g prefix C-b
bind C-b send-prefix

# Reload config quickly.
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux config reloaded"

# The default C-b t opens clock-mode; it is visual noise in this setup.
unbind t

# Split panes in the current directory.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Create/close windows in the current directory. Window = tmux tab.
bind c new-window -c "#{pane_current_path}"
bind & kill-window

# Close panes without confirmation.
bind x kill-pane

# Vim-style pane movement and resizing.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Manual pane titles. They show in pane borders when set.
bind T command-prompt -p "pane title" "select-pane -T '%%'"

# Project/session workflow.
bind p display-popup -E -w 90% -h 80% "$XDG_CONFIG_HOME/tmux/scripts/project-session"

# Scratch shell in the current pane directory; exits without disturbing layout.
bind e display-popup -E -d "#{pane_current_path}" -w 90% -h 80% "$SHELL -l"

# URL picker over pane history.
bind u run-shell 'tmp="${XDG_RUNTIME_DIR:-/tmp}/tmux-urls-$(date +%s)-$$"; tmux capture-pane -pJS - -t "#{pane_id}" > "$tmp"; tmux display-popup -E -w 90% -h 80% "/home/razvan/.config/tmux/scripts/open-url \"$tmp\"; rm -f \"$tmp\""'

# Native scrollback search. This enters copy-mode and jumps to the match.
bind / command-prompt -p "search scrollback" 'copy-mode; send-keys -X search-backward "%%"'

# Explicit resurrect save/restore. Continuum still auto-saves periodically.
bind C-s run-shell "$HOME/.local/share/tmux/plugins/tmux-resurrect/scripts/save.sh"
bind C-r run-shell "$HOME/.local/share/tmux/plugins/tmux-resurrect/scripts/restore.sh"

# Fuzzy-filter scrollback in a popup. Selecting a line copies it to clipboard.
bind f run-shell 'tmp="${XDG_RUNTIME_DIR:-/tmp}/tmux-find-$(date +%s)-$$"; tmux capture-pane -pJS - -t "#{pane_id}" > "$tmp"; tmux display-popup -E -w 90% -h 80% "/home/razvan/.config/tmux/scripts/find-scrollback \"$tmp\"; rm -f \"$tmp\""'

# Copy mode: vi keys, clipboard copy, and animated line-stepped C-u/C-d so
# scrolling keeps context. This is still terminal grid scrolling, not pixel
# animation, but avoids the default half-page jump.
setw -g mode-keys vi
bind -T copy-mode-vi C-u run-shell -b 'i=0; while [ $i -lt 16 ]; do tmux send-keys -t "#{pane_id}" -X scroll-up; i=$((i + 1)); sleep 0.005; done'
bind -T copy-mode-vi C-d run-shell -b 'i=0; while [ $i -lt 16 ]; do tmux send-keys -t "#{pane_id}" -X scroll-down; i=$((i + 1)); sleep 0.005; done'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || xsel -ib 2>/dev/null || wl-copy 2>/dev/null || cat >/dev/null"
