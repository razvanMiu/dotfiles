##### Plugins #################################################################

# Keep plugin code out of the tracked ~/.config repo.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# SessionX: fuzzy switch/create sessions; depends on fzf + bat, zoxide optional.
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-x-path "$XDG_CONFIG_HOME"
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-fzf-builtin-tmux 'on'
set -g @sessionx-git-branch 'on'
set -g @sessionx-additional-options '--color=bg+:#363A4F,bg:#24273A,spinner:#F4DBD6,hl:#ED8796,fg:#CAD3F5,header:#ED8796,info:#C6A0F6,pointer:#F4DBD6,marker:#B7BDF8,fg+:#CAD3F5,prompt:#C6A0F6,hl+:#ED8796'

# tmux-resurrect/continuum: persist tmux layouts as state, not config.
set -g @resurrect-dir "$HOME/.local/state/tmux/resurrect"
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-r'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

# Initialize TPM and plugin-provided theme/status machinery.
run "$HOME/.local/share/tmux/plugins/tpm/tpm"
