##### Core behaviour ###########################################################

# Use a modern terminal description inside tmux. st should support truecolor when
# TERM outside tmux is st-256color; tmux adds RGB via terminal-features below.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,st-256color:RGB,kitty:RGB"
set -g focus-events on
set -g set-clipboard on
set -g extended-keys on
set -g extended-keys-format csi-u

# Fast, predictable interaction.
set -sg escape-time 0
set -g repeat-time 500
set -g display-time 3000
set -g history-limit 50000
set -g mouse on

# Humane indexes and stable window names. tmux otherwise auto-renames windows
# from the active pane command/title, which makes C-b , feel ignored.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
setw -g allow-rename off

# Preserve useful shell/env behaviour.
set -g default-shell "$SHELL"
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
