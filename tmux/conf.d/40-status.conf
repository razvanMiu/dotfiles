##### Status and pane context #################################################

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 120

# Show every pane's current directory in its border; otherwise inactive panes
# lose shell context once the zsh prompt is minimized inside tmux. Manual pane
# title appears when set with C-b T.
set -g pane-border-format " #[fg=#6E738D]#P#{?#{==:#{pane_title},#{host_short}},, #[fg=#F5BDE6]#{pane_title}} #[fg=#A5ADCB]#{b:pane_current_path} "
set -g pane-border-style "fg=#5B6078"
set -g pane-active-border-style "fg=#B7BDF8"

# Hide pane border labels for single-pane windows; show them only when splits
# exist. pane-border-status itself is not format-conditional, so hooks keep the
# per-window option in sync as layouts change/focus moves.
if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"
set-hook -g pane-focus-in 'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'

# Source Catppuccin explicitly before composing status. TPM's run hook is not a
# good ordering boundary for custom modules during config reloads/new servers.
source "$HOME/.local/share/tmux/plugins/tmux/catppuccin_tmux.conf"

# Catppuccin-shaped custom modules.
source "$XDG_CONFIG_HOME/tmux/status/git_branch.conf"

# Left: session/window context. Right: active pane context.
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{?#{==:#(/home/razvan/.config/tmux/scripts/git-branch \"#{pane_current_path}\"),},,#{E:@catppuccin_status_git_branch}}"
